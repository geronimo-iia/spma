name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --locked -p spma-cli --target ${{ matrix.target }}
          else
            cargo build --release --locked -p spma-cli --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.target }}.tar.gz spma

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8

      - uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref, '-rc') }}
          files: '*/*.tar.gz'

  publish:
    needs: release
    if: ${{ !contains(github.ref, '-rc') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Publish spma to crates.io
        run: cargo publish --locked -p spma --token ${{ secrets.CARGO_TOKEN }}

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Wait for spma to be indexed on crates.io
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="spma") | .version')
          echo "Waiting for spma v${VERSION} to appear in crates.io index..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "User-Agent: spma-release-workflow" "https://crates.io/api/v1/crates/spma/${VERSION}")
            if [ "$STATUS" = "200" ]; then
              echo "spma v${VERSION} is available."
              break
            fi
            echo "Attempt $i: not yet available (HTTP $STATUS), retrying in 15s..."
            sleep 15
          done
          if [ "$STATUS" != "200" ]; then
            echo "Timed out waiting for spma v${VERSION} on crates.io"
            exit 1
          fi

      - name: Publish spma-cli to crates.io
        run: cargo publish --locked -p spma-cli --token ${{ secrets.CARGO_TOKEN }}
